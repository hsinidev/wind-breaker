server {
    listen 80;
    server_name windbreaker-manga-online.com; # Replace with your domain

    root /var/www/wind-breaker/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml medical/xml application/xml+rss text/javascript;

    # Cache-Control for Static Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # SPA Routing Handle
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA Service Worker (Always Fresh)
    location /sw.js {
        add_header Cache-Control "no-cache";
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        expires off;
        access_log off;
    }

    error_page 404 /index.html;
}
