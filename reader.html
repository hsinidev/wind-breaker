<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Reader | WIND BREAKER</title>
  <link rel="stylesheet" href="/src/style.css">
  
  <!-- Dynamic JSON-LD Schema Placeholder -->
  <script type="application/ld+json" id="dynamic-schema"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J6WCD43K95"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J6WCD43K95');
  </script>
  <link rel="canonical" id="dynamic-canonical" href="https://wdbreaker.com/reader.html">
</head>
<body class="bg-black text-off-white overflow-x-hidden selection:bg-neon-cyan selection:text-asphalt">
  
  <!-- Reader Header Overlay -->
  <header class="fixed top-0 w-full z-40 bg-gradient-to-b from-black/80 to-transparent p-4 flex justify-between items-center transition-opacity duration-300" id="reader-header">
     <div class="flex items-center gap-4">
        <a href="/chapters.html" class="glass-panel p-2 hover:bg-neon-cyan/20 transition-all border border-white/10">
           <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <div>
           <h1 id="chapter-title" class="text-xs md:text-sm font-black uppercase italic tracking-widest neon-glow">Mission Active</h1>
           <p class="text-[9px] font-bold text-off-white/40 uppercase tracking-widest">Protocol Delta-Nine</p>
        </div>
     </div>
     <div id="reading-progress-text" class="text-[10px] font-black italic tracking-widest text-neon-cyan bg-asphalt/50 px-3 py-1 border border-neon-cyan/20">0% COMPLETE</div>
  </header>

  <!-- Progress Bar Global -->
  <div class="fixed top-0 left-0 w-full h-[2px] bg-white/5 z-50">
    <div id="reading-progress-bar" class="h-full bg-neon-cyan shadow-[0_0_10px_#00f2ff] transition-all duration-300" style="width: 0%"></div>
  </div>

  <main id="reader-container" class="w-full max-w-[800px] mx-auto min-h-screen reader-view">
    <!-- Pages injected here -->
    <div id="loading-overlay" class="fixed inset-0 bg-black z-30 flex flex-col items-center justify-center gap-6">
       <div class="w-12 h-12 border-4 border-white/5 border-t-neon-cyan rounded-full animate-spin"></div>
       <p class="text-neon-cyan font-black italic tracking-widest text-xs animate-pulse">DOWNLOADING INTEL...</p>
    </div>
  </main>

  <!-- Bottom Control Overlay -->
  <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 glass-panel px-6 py-4 flex items-center gap-8 md:gap-12 border border-white/10" id="reader-controls">
     <button id="prev-ch" class="text-xs font-black uppercase tracking-widest hover:text-neon-cyan disabled:opacity-20 transition-colors">PREV MISSION</button>
     
     <div class="h-4 w-px bg-white/10"></div>
     
     <button id="index-toggle" class="text-xs font-black uppercase tracking-widest hover:text-neon-cyan transition-colors">INDEX</button>
     
     <div class="h-4 w-px bg-white/10"></div>
     
     <button id="next-ch" class="text-xs font-black uppercase tracking-widest hover:text-neon-cyan disabled:opacity-20 transition-colors">NEXT MISSION</button>
  </nav>

  <!-- Summary Side Panel (PROMPT_06 Preview) -->
  <div id="summary-panel" class="fixed inset-y-0 right-0 w-80 bg-asphalt border-l border-white/10 z-50 translate-x-full transition-transform duration-500 shadow-2xl p-8 flex flex-col">
     <button id="summary-close" class="self-end text-off-white/40 hover:text-white mb-8">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
     </button>
     <h2 class="text-neon-cyan font-black italic uppercase text-2xl mb-4">TACTICAL REPORT</h2>
     <div class="flex-1 overflow-y-auto pr-4 text-sm font-medium leading-relaxed text-off-white/70 space-y-4" id="chapter-summary-content">
        <p class="animate-pulse italic">Accessing encrypted archives...</p>
     </div>
     <div class="mt-8 pt-6 border-t border-white/5">
        <p class="text-[10px] font-bold text-warning-yellow uppercase tracking-widest">END OF REPORT</p>
     </div>
  </div>

  <script type="module" src="/src/reader.js"></script>
</body>
</html>
