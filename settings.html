<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Settings | WIND BREAKER</title>
  <link rel="stylesheet" href="/src/style.css">
  
  <link rel="canonical" href="https://wdbreaker.com/settings.html">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J6WCD43K95"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J6WCD43K95');
  </script>
</head>
<body class="bg-dark-bg text-off-white selection:bg-neon-cyan selection:text-asphalt">
  <nav class="fixed top-0 w-full z-50 glass-panel py-4 px-6 md:px-12 flex justify-between items-center" id="main-nav">
    <div class="flex items-center gap-2">
      <a href="/" class="w-8 h-8 bg-neon-cyan rotate-45 flex items-center justify-center overflow-hidden">
        <span class="text-asphalt font-black -rotate-45 text-xs">WB</span>
      </a>
      <a href="/" class="text-2xl font-black italic tracking-tighter neon-glow">WIND <span class="text-warning-yellow">BREAKER</span></a>
    </div>
    <div class="flex gap-4">
      <a href="/chapters.html" class="hover:text-neon-cyan font-bold uppercase text-[10px] tracking-widest border border-white/10 px-4 py-2 hover:border-neon-cyan transition-all">Archive</a>
    </div>
  </nav>

  <main class="pt-32 pb-24 container mx-auto px-6 max-w-3xl">
    <header class="mb-12 border-b border-warning-yellow/10 pb-8">
      <h1 class="text-5xl md:text-7xl font-black italic uppercase italic leading-none mb-4">SYSTEM <span class="text-warning-yellow">CONFIG</span></h1>
      <p class="text-off-white/30 font-bold uppercase text-[10px] tracking-[0.3em]">Core Operational Parameters v4.0.0</p>
    </header>

    <div class="space-y-12">
      <!-- Theme Config -->
      <section class="glass-panel p-8 border border-white/5">
        <h3 class="text-neon-cyan font-black italic uppercase tracking-widest text-sm mb-6 flex items-center gap-2">
           <span class="w-4 h-4 bg-neon-cyan rotate-45"></span> VISUAL OUTPUT
        </h3>
        <div class="flex flex-col gap-6">
           <div class="flex justify-between items-center">
              <div>
                 <p class="font-black uppercase italic text-lg">NIGHT OPS MODE</p>
                 <p class="text-[10px] font-bold text-off-white/30 tracking-widest">OLED OPTIMIZED DARK THEME</p>
              </div>
              <button id="theme-toggle" class="w-14 h-8 bg-asphalt border border-white/10 p-1 flex items-center transition-all">
                 <div class="w-6 h-6 bg-neon-cyan"></div>
              </button>
           </div>
        </div>
      </section>

      <!-- Storage Config -->
      <section class="glass-panel p-8 border border-white/5">
        <h3 class="text-warning-yellow font-black italic uppercase tracking-widest text-sm mb-6 flex items-center gap-2">
           <span class="w-4 h-4 bg-warning-yellow rotate-45"></span> MEMORY CORES
        </h3>
        <div class="space-y-8">
           <div class="flex justify-between items-start">
              <div>
                 <p class="font-black uppercase italic text-lg">CHAPTER CACHE</p>
                 <p class="text-[10px] font-bold text-off-white/30 tracking-widest">OFFLINE DATA SYNCHRONIZATION</p>
              </div>
              <button id="clear-cache" class="border border-warning-yellow/30 px-6 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-warning-yellow hover:text-asphalt transition-all">WIPE DATA</button>
           </div>
           
           <div id="storage-stats" class="text-[10px] font-mono text-off-white/20 tracking-widest">
              CALCULATING MEMORY USAGE...
           </div>
        </div>
      </section>

      <!-- PWA Protocol -->
      <section class="glass-panel p-8 border border-white/5">
        <h3 class="text-off-white font-black italic uppercase tracking-widest text-sm mb-6 flex items-center gap-2">
           <span class="w-4 h-4 bg-off-white rotate-45"></span> DEPLOYMENT STATE
        </h3>
        <div class="flex justify-between items-center">
           <div>
              <p class="font-black uppercase italic text-lg">OFFLINE PROTOCOL</p>
              <p id="install-status" class="text-[10px] font-bold text-green-500 tracking-widest">SYSTEM INSTALLED & OPTIMIZED</p>
           </div>
           <button id="install-btn" class="hidden border border-neon-cyan px-6 py-2 text-[10px] font-black uppercase tracking-widest bg-neon-cyan/10 hover:bg-neon-cyan hover:text-asphalt transition-all">COMMENCE INSTALL</button>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="/src/settings.js"></script>
</body>
</html>
